apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dashboard-workload-reader
  labels:
    app: azure-local-dashboard
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "services"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dashboard-workload-reader-binding
  labels:
    app: azure-local-dashboard
subjects:
  - kind: ServiceAccount
    name: default
    namespace: azure-local-ops
roleRef:
  kind: ClusterRole
  name: dashboard-workload-reader
  apiGroup: rbac.authorization.k8s.io
