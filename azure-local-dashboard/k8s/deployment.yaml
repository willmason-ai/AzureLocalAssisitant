apiVersion: apps/v1
kind: Deployment
metadata:
  name: azure-local-dashboard
  namespace: azure-local-ops
  labels:
    app: azure-local-dashboard
spec:
  replicas: 1
  strategy:
    type: Recreate  # Required: PVC is ReadWriteOnce, can't attach to two nodes during rolling update
  selector:
    matchLabels:
      app: azure-local-dashboard
  template:
    metadata:
      labels:
        app: azure-local-dashboard
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: fix-data-permissions
          image: busybox:1.36
          command: ['sh', '-c', 'mkdir -p /app/data/conversations && chown -R 1000:1000 /app/data']
          volumeMounts:
            - name: data
              mountPath: /app/data
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
      containers:
        - name: dashboard
          image: cravsnetmon.azurecr.io/azure-local-dashboard:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 5230
              protocol: TCP
          envFrom:
            - secretRef:
                name: dashboard-secrets
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5230
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5230
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dashboard-data
      imagePullSecrets:
        - name: acr-secret
