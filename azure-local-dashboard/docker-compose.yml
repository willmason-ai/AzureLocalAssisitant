services:
  azure-local-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5230:5230"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - dashboard-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    dns:
      - 10.20.10.5
      - 8.8.8.8

volumes:
  dashboard-data:
    driver: local
