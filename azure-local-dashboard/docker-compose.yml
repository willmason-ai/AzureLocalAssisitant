services:
  azure-local-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5230:5230"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - dashboard-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    # BUG-041: DNS inherited from host. Override via .env or docker network config if needed.

volumes:
  dashboard-data:
    driver: local
